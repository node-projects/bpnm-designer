<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>BPMN Editor</title>

  <script type="esms-options">
    {
      "shimMode": true
    }
  </script>
  <script src="./node_modules/es-module-shims/dist/es-module-shims.js"></script>
  <script type="importmap-shim">
    {
      "imports": {
        "monaco-editor": "./node_modules/monaco-editor/esm/vs/editor/editor.main.js",
        "monaco-editor/": "./node_modules/monaco-editor/",
        "@node-projects/base-custom-webcomponent": "./node_modules/@node-projects/base-custom-webcomponent/dist/index.js",
        "@node-projects/base-custom-webcomponent/": "./node_modules/@node-projects/base-custom-webcomponent/",
        "@node-projects/web-component-designer": "./node_modules/@node-projects/web-component-designer/dist/index.js",
        "@node-projects/web-component-designer/": "./node_modules/@node-projects/web-component-designer/",
        "@node-projects/web-component-designer-codeview-monaco": "./node_modules/@node-projects/web-component-designer-codeview-monaco/dist/widgets/codeView/code-view-monaco.js",
        "@node-projects/web-component-designer-codeview-monaco/": "./node_modules/@node-projects/web-component-designer-codeview-monaco/"
      }
    }
  </script>
  <link rel="stylesheet" href="./node_modules/monaco-editor/min/vs/editor/editor.main.css">

  <style>
    :root {
      color-scheme: light;
      --surface: #f5f2ea;
      --surface-strong: #fffdf7;
      --surface-deep: #1d2d2a;
      --surface-muted: #dde7df;
      --accent: #0b7a75;
      --accent-soft: rgba(11, 122, 117, 0.12);
      --ink: #11211f;
      --ink-soft: #4f6460;
      --outline: rgba(17, 33, 31, 0.12);
      --shadow: 0 18px 36px rgba(17, 33, 31, 0.12);
      font-family: Aptos, "Segoe UI Variable Text", "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background:
        radial-gradient(circle at top left, rgba(255, 255, 255, 0.9), transparent 30%),
        linear-gradient(135deg, #efe7d8 0%, #f7f5ef 42%, #d9e8df 100%);
      color: var(--ink);
    }

    body {
      padding: 18px;
    }

    .shell {
      display: grid;
      grid-template-columns: 240px minmax(0, 1fr) 320px;
      grid-template-rows: auto minmax(0, 1fr);
      grid-template-areas:
        "header header header"
        "palette canvas inspector";
      gap: 14px;
      width: 100%;
      height: 100%;
    }

    .panel {
      background: color-mix(in srgb, var(--surface-strong) 84%, white 16%);
      border: 1px solid var(--outline);
      border-radius: 22px;
      box-shadow: var(--shadow);
      overflow: hidden;
      backdrop-filter: blur(16px);
    }

    header {
      grid-area: header;
      display: grid;
      gap: 14px;
      padding: 18px 20px;
      min-height: 126px;
      background:
        linear-gradient(120deg, rgba(11, 122, 117, 0.95), rgba(29, 45, 42, 0.94)),
        linear-gradient(45deg, rgba(255, 255, 255, 0.08), transparent 55%);
      color: white;
    }

    .header-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
    }

    .title-block {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .eyebrow {
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.68);
    }

    h1 {
      margin: 0;
      font-size: 28px;
      font-weight: 650;
      letter-spacing: -0.03em;
      font-family: "Aptos Display", Aptos, "Segoe UI Variable Display", sans-serif;
    }

    .subtitle {
      color: rgba(255, 255, 255, 0.74);
      font-size: 14px;
    }

    .header-meta {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 10px;
      flex-wrap: wrap;
    }

    .menu-bar {
      display: flex;
      align-items: stretch;
      gap: 12px;
      flex-wrap: wrap;
    }

    .menu-section {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 12px;
      border-radius: 18px;
      border: 1px solid rgba(255, 255, 255, 0.16);
      background: rgba(255, 255, 255, 0.09);
      backdrop-filter: blur(12px);
    }

    .menu-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.62);
      white-space: nowrap;
    }

    .menu-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    button {
      border: 0;
      border-radius: 999px;
      padding: 11px 16px;
      font: inherit;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 140ms ease, opacity 140ms ease, background-color 140ms ease;
    }

    button:hover {
      transform: translateY(-1px);
    }

    button:disabled {
      opacity: 0.45;
      cursor: default;
      transform: none;
    }

    .menu-button {
      min-height: 40px;
      padding: 9px 12px;
      border-radius: 12px;
      border: 1px solid rgba(17, 33, 31, 0.22);
      background: rgba(255, 255, 255, 0.92);
      color: #10211f;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      font-weight: 600;
      box-shadow: 0 2px 0 rgba(17, 33, 31, 0.08);
    }

    .menu-button-primary {
      background: #fefaf0;
      color: var(--surface-deep);
      border-color: rgba(17, 33, 31, 0.3);
    }

    .menu-button:hover:not(:disabled) {
      background: #ffffff;
      border-color: rgba(17, 33, 31, 0.32);
    }

    .button-key {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: rgba(16, 33, 31, 0.58);
    }

    .menu-button-primary .button-key {
      color: rgba(17, 33, 31, 0.46);
    }

    .button-icon {
      width: 16px;
      height: 16px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: currentColor;
      flex: 0 0 auto;
    }

    .button-icon svg {
      width: 16px;
      height: 16px;
      stroke: currentColor;
      fill: none;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .repo-link {
      min-height: 42px;
      padding: 0 16px;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      color: white;
      text-decoration: none;
      font-size: 13px;
      font-weight: 600;
      border: 1px solid rgba(255, 255, 255, 0.16);
      background: rgba(255, 255, 255, 0.12);
      transition: transform 140ms ease, background-color 140ms ease;
    }

    .repo-link:hover {
      transform: translateY(-1px);
      background: rgba(255, 255, 255, 0.18);
    }

    .repo-link svg {
      width: 16px;
      height: 16px;
      fill: currentColor;
    }

    .file-name {
      min-height: 42px;
      padding: 0 16px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.1);
      color: rgba(255, 255, 255, 0.9);
      font-size: 12px;
      font-weight: 600;
      min-width: 200px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .palette-panel {
      grid-area: palette;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    .canvas-panel {
      grid-area: canvas;
      min-width: 0;
      min-height: 0;
      position: relative;
    }

    .inspector-panel {
      grid-area: inspector;
      min-height: 0;
      display: flex;
      flex-direction: column;
    }

    .panel-title {
      padding: 16px 18px 8px;
      font-size: 12px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--ink-soft);
    }

    .recent-section {
      display: grid;
      gap: 10px;
      padding: 0 18px 16px;
      border-bottom: 1px solid var(--outline);
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.38), rgba(255, 255, 255, 0));
    }

    .recent-section-title {
      font-size: 11px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--ink-soft);
    }

    .recent-documents {
      display: grid;
      gap: 8px;
    }

    .recent-document {
      width: 100%;
      border-radius: 16px;
      padding: 10px 12px;
      border: 1px solid color-mix(in srgb, var(--accent) 22%, white 78%);
      background: color-mix(in srgb, var(--accent-soft) 72%, white 28%);
      color: var(--ink);
      text-align: left;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 4px;
    }

    .recent-document time {
      color: var(--ink-soft);
      font-size: 11px;
      font-weight: 500;
    }

    .recent-empty {
      color: var(--ink-soft);
      font-size: 12px;
      line-height: 1.45;
      padding-bottom: 4px;
    }

    #document-host {
      width: 100%;
      height: 100%;
      min-height: 0;
    }

    .drop-hint {
      position: absolute;
      inset: 18px;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 26px;
      border-radius: 22px;
      border: 2px dashed rgba(11, 122, 117, 0.35);
      background: rgba(255, 253, 247, 0.82);
      color: var(--ink-soft);
      text-align: center;
      line-height: 1.5;
      backdrop-filter: blur(10px);
      pointer-events: none;
      z-index: 20;
    }

    .canvas-panel.drop-active .drop-hint {
      display: flex;
    }

    node-projects-palette-view,
    node-projects-web-component-designer-property-grid-with-header {
      flex: 1;
      min-height: 0;
    }

    @media (max-width: 1200px) {
      .shell {
        grid-template-columns: 240px minmax(0, 1fr);
        grid-template-rows: auto minmax(300px, 1fr) 320px;
        grid-template-areas:
          "header header"
          "palette canvas"
          "inspector inspector";
      }
    }

    @media (max-width: 820px) {
      body {
        padding: 10px;
      }

      .shell {
        grid-template-columns: minmax(0, 1fr);
        grid-template-rows: auto 280px minmax(0, 1fr) 280px;
        grid-template-areas:
          "header"
          "palette"
          "canvas"
          "inspector";
      }

      header {
        align-items: flex-start;
        flex-direction: column;
      }

      .header-top {
        width: 100%;
      }

      .header-meta {
        width: 100%;
        justify-content: stretch;
      }

      .repo-link,
      .file-name,
      .menu-section {
        width: 100%;
      }

      .menu-section {
        align-items: flex-start;
        flex-direction: column;
      }

      .file-name {
        width: 100%;
      }
    }
  </style>

  <script type="module">
    window.MonacoEnvironment = {
      getWorker(_, label) {
        switch (label) {
          case 'json':
            return new Worker('./node_modules/monaco-editor/esm/vs/language/json/json.worker.js', { type: 'module' });
          case 'css':
          case 'scss':
          case 'less':
            return new Worker('./node_modules/monaco-editor/esm/vs/language/css/css.worker.js', { type: 'module' });
          case 'html':
          case 'handlebars':
          case 'razor':
          case 'xml':
            return new Worker('./node_modules/monaco-editor/esm/vs/language/html/html.worker.js', { type: 'module' });
          default:
            return new Worker('./node_modules/monaco-editor/esm/vs/editor/editor.worker.js', { type: 'module' });
        }
      }
    };
  </script>
</head>

<body>
  <div class="shell">
    <header>
      <div class="header-top">
        <div class="title-block">
          <div class="eyebrow">BPMN XML Workspace</div>
          <h1>Process Layout Designer</h1>
          <div class="subtitle">Visual BPMN editing with synchronized XML split view</div>
        </div>
        <div class="header-meta">
          <a class="repo-link" href="https://github.com/node-projects/bpnm-designer.git" target="_blank" rel="noreferrer">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 .5C5.65.5.5 5.65.5 12a11.5 11.5 0 0 0 7.86 10.92c.58.1.79-.25.79-.56v-2.15c-3.2.7-3.88-1.36-3.88-1.36-.52-1.32-1.28-1.67-1.28-1.67-1.05-.71.08-.7.08-.7 1.16.08 1.77 1.2 1.77 1.2 1.03 1.77 2.7 1.26 3.36.96.1-.75.4-1.26.73-1.54-2.56-.3-5.24-1.28-5.24-5.72 0-1.26.45-2.3 1.2-3.11-.12-.3-.52-1.5.11-3.13 0 0 .97-.31 3.18 1.19A11.05 11.05 0 0 1 12 6.1c.98 0 1.97.13 2.9.39 2.2-1.5 3.17-1.2 3.17-1.2.64 1.64.24 2.84.12 3.14.74.8 1.19 1.84 1.19 3.1 0 4.45-2.69 5.42-5.25 5.71.41.36.78 1.08.78 2.18v3.24c0 .31.2.67.8.56A11.5 11.5 0 0 0 23.5 12C23.5 5.65 18.35.5 12 .5Z"></path></svg>
            <span>GitHub Repo</span>
          </a>
          <div class="file-name" id="file-name">sample.bpmn</div>
        </div>
      </div>
      <nav class="menu-bar" aria-label="Editor actions">
        <div class="menu-section">
          <div class="menu-label">File</div>
          <div class="menu-actions">
            <button class="menu-button menu-button-primary" id="open-button" type="button"><span class="button-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M4 19h16"></path><path d="M12 5v10"></path><path d="m7 10 5 5 5-5"></path></svg></span><span>Load</span><span class="button-key">Ctrl+O</span></button>
            <button class="menu-button" id="sample-button" type="button"><span class="button-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M4 6h16"></path><path d="M4 12h16"></path><path d="M4 18h10"></path></svg></span><span>Sample</span></button>
            <button class="menu-button" id="save-button" type="button"><span class="button-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M5 5h11l3 3v11H5z"></path><path d="M9 5v5h6"></path><path d="M8 19h8"></path></svg></span><span>Save</span><span class="button-key">Ctrl+S</span></button>
            <button class="menu-button" id="save-as-button" type="button"><span class="button-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M5 5h11l3 3v11H5z"></path><path d="M12 11v6"></path><path d="m9 14 3-3 3 3"></path></svg></span><span>Save As</span></button>
          </div>
        </div>
        <div class="menu-section">
          <div class="menu-label">Edit</div>
          <div class="menu-actions">
            <button class="menu-button" id="undo-button" type="button"><span class="button-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M9 7H4v5"></path><path d="M4 12a8 8 0 1 0 2.3-5.7L4 7"></path></svg></span><span>Undo</span><span class="button-key">Ctrl+Z</span></button>
            <button class="menu-button" id="redo-button" type="button"><span class="button-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M15 7h5v5"></path><path d="M20 12a8 8 0 1 1-2.3-5.7L20 7"></path></svg></span><span>Redo</span><span class="button-key">Ctrl+Shift+Z</span></button>
            <button class="menu-button" id="copy-button" type="button"><span class="button-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><rect x="9" y="9" width="10" height="10" rx="2"></rect><rect x="5" y="5" width="10" height="10" rx="2"></rect></svg></span><span>Copy</span><span class="button-key">Ctrl+C</span></button>
            <button class="menu-button" id="paste-button" type="button"><span class="button-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M9 4h6"></path><path d="M8 6h8v14H6V8h2"></path><path d="M10 11h4"></path></svg></span><span>Paste</span><span class="button-key">Ctrl+V</span></button>
            <button class="menu-button" id="select-all-button" type="button"><span class="button-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><rect x="4" y="4" width="16" height="16" rx="2"></rect><path d="M9 9h6v6H9z"></path></svg></span><span>Select All</span><span class="button-key">Ctrl+A</span></button>
            <button class="menu-button" id="delete-button" type="button"><span class="button-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M4 7h16"></path><path d="M10 11v6"></path><path d="M14 11v6"></path><path d="M6 7l1 13h10l1-13"></path><path d="M9 7V4h6v3"></path></svg></span><span>Delete</span><span class="button-key">Del</span></button>
          </div>
        </div>
      </nav>
    </header>

    <section class="panel palette-panel">
      <div class="panel-title">Palette</div>
      <div class="recent-section">
        <div class="recent-section-title">Recent</div>
        <div class="recent-documents" id="recent-documents"></div>
      </div>
      <node-projects-palette-view id="palette-view"></node-projects-palette-view>
    </section>

    <section class="panel canvas-panel" id="canvas-panel">
      <div id="document-host"></div>
      <div class="drop-hint" id="drop-hint" hidden>Drop a BPMN or XML file here to load it into the split-view editor.</div>
    </section>

    <section class="panel inspector-panel">
      <div class="panel-title">Inspector</div>
      <node-projects-web-component-designer-property-grid
        id="property-grid"></node-projects-web-component-designer-property-grid>
    </section>
  </div>

  <input id="file-input" type="file" accept=".bpmn,.xml" hidden>

  <script type="module-shim">
    import './dist/initialize.js';
  </script>
</body>

</html>
